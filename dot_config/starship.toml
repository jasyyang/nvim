format = """$python$directory$git_branch$character"""

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
vimcmd_symbol = "[<](bold green)"

[directory]
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = "[\\[ $branch\\]]($style) "

[python]
format = "[(\\($virtualenv\\) )]($style)"
